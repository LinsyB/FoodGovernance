<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voedselsysteem Game</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

    <aside id="sidebar">

         <section id="previewPanel">

            <h2>Huidige groep</h2>

            <div id="groepPreview"></div>

            <div id="rotatieInfo">
                ← / → draaien
            </div>

        </section>


        <section id="statsPanel">


         <div class="stat">
                <label>Emissies</label>
                <div class="bar">
                    <div id="emissiesBar" class="fill emissies"></div>
                </div>
                <span id="emissiesValue">50</span>
            </div>

            <div class="stat">
                <label>Biodiversiteit</label>
                <div class="bar">
                    <div id="bioBar" class="fill bio"></div>
                </div>
                <span id="bioValue">50</span>
            </div>

            <div class="stat">
                <label>Gezondheid</label>
                <div class="bar">
                    <div id="gezondheidBar" class="fill gezondheid"></div>
                </div>
                <span id="gezondheidValue">50</span>
            </div>

            <div class="stat">
                <label>Inclusiviteit</label>
                <div class="bar">
                    <div id="inclusiviteitBar" class="fill inclusiviteit"></div>
                </div>
                <span id="inclusiviteitValue">50</span>
            </div>

            <div class="stat">
                <label>Eerlijke keten</label>
                <div class="bar">
                    <div id="ketenBar" class="fill keten"></div>
                </div>
                <span id="ketenValue">50</span>
            </div>

            <div class="stat">
                <label>Betaalbaarheid</label>
                <div class="bar">
                    <div id="betaalbaarheidBar" class="fill betaalbaarheid"></div>
                </div>
                <span id="betaalbaarheidValue">50</span>
            </div>

            <div class="stat">
                <label>Productie</label>
                <div class="bar">
                    <div id="productieBar" class="fill productie"></div>
                </div>
                <span id="productieValue">50</span>
            </div>

        </section>


        <details id="devPanel">
            <summary>Dev Mode</summary>

            <div id="devContent">

            </div>
        </details>

    </aside>

    <main id="gameArea">

        <div id="backgroundLayer"></div>

        <div id="boardWrapper">

            <div id="hexBoard"></div>

        </div>

        <div id="cursorPreview"></div>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
